name: Daily Meme Hunt

on:
  schedule:
    # This tells the robot to run every 12 hours
    - cron: '0 */12 * * *' 
  workflow_dispatch: # Allows you to run it manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run Hunter Bot
        env:
          # We use "Secrets" so your keys aren't visible in the code
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python hunter_bot.py