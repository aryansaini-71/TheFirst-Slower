name: Daily Meme Hunt

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, and 18:00 every day
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to run it manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run Hunter Bot
        env:
          # We use "Secrets" so your keys aren't visible in the code
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python hunter_bot.py